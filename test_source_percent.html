<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Source Percent 测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        .editable {
            cursor: pointer;
            background-color: #fff3cd;
        }
        .editable:hover {
            background-color: #ffe69c;
        }
        .editing {
            background-color: #d1ecf1;
        }
        input[type="text"] {
            width: 100%;
            padding: 4px;
            border: 2px solid #6366f1;
            border-radius: 4px;
        }
        button {
            margin: 5px;
            padding: 8px 16px;
            cursor: pointer;
        }
        .log {
            margin-top: 20px;
            padding: 10px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            background-color: white;
            border-left: 3px solid #007bff;
        }
        .error {
            border-left-color: #dc3545;
            color: #dc3545;
        }
        .success {
            border-left-color: #28a745;
            color: #28a745;
        }
    </style>
</head>
<body>
    <h1>Source Percent 倍数机制测试</h1>
    
    <div>
        <button onclick="addRow()">添加行</button>
        <button onclick="saveToLocalStorage()">保存到本地存储</button>
        <button onclick="loadFromLocalStorage()">从本地存储加载</button>
        <button onclick="clearData()">清空数据</button>
    </div>
    
    <table id="testTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>公式</th>
                <th>Source (倍数)</th>
                <th>计算结果</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr data-id="1">
                <td>1</td>
                <td>100+50</td>
                <td class="editable source-cell" data-source="1" ondblclick="editSource(this)">1</td>
                <td class="result-cell">150</td>
                <td><button onclick="deleteRow(this)">删除</button></td>
            </tr>
        </tbody>
    </table>
    
    <div class="log" id="logArea">
        <h3>操作日志：</h3>
        <div id="logContent"></div>
    </div>

    <script>
        let rowIdCounter = 1;
        
        function log(message, type = 'info') {
            const logContent = document.getElementById('logContent');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            logContent.insertBefore(entry, logContent.firstChild);
        }
        
        function addRow() {
            rowIdCounter++;
            const tbody = document.getElementById('tableBody');
            const row = document.createElement('tr');
            row.setAttribute('data-id', rowIdCounter);
            row.innerHTML = `
                <td>${rowIdCounter}</td>
                <td>100+50</td>
                <td class="editable source-cell" data-source="1" ondblclick="editSource(this)">1</td>
                <td class="result-cell">150</td>
                <td><button onclick="deleteRow(this)">删除</button></td>
            `;
            tbody.appendChild(row);
            calculateResult(row);
            log(`添加了新行 ID: ${rowIdCounter}`, 'success');
        }
        
        function deleteRow(button) {
            const row = button.closest('tr');
            const id = row.getAttribute('data-id');
            row.remove();
            log(`删除了行 ID: ${id}`, 'info');
        }
        
        function editSource(cell) {
            if (cell.classList.contains('editing')) return;
            
            const currentValue = cell.getAttribute('data-source') || cell.textContent.trim();
            const originalValue = currentValue;
            
            cell.classList.add('editing');
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentValue;
            input.placeholder = 'e.g. 1 or 2 or 0.5 (倍数)';
            input.style.width = '100%';
            input.style.padding = '4px';
            input.style.border = '2px solid #6366f1';
            input.style.borderRadius = '4px';
            
            const originalContent = cell.textContent;
            cell.textContent = '';
            cell.appendChild(input);
            input.focus();
            input.select();
            
            const saveEdit = () => {
                const newValue = input.value.trim() || '1';
                input.remove();
                cell.classList.remove('editing');
                
                // 验证输入值
                const numValue = parseFloat(newValue);
                if (isNaN(numValue)) {
                    alert('请输入有效的数字');
                    cell.textContent = originalContent;
                    cell.setAttribute('data-source', originalValue);
                    calculateResult(cell.closest('tr'));
                    return;
                }
                
                // 更新显示和数据属性
                cell.textContent = newValue;
                cell.setAttribute('data-source', newValue);
                
                // 重新计算
                calculateResult(cell.closest('tr'));
                
                log(`行 ${cell.closest('tr').getAttribute('data-id')} Source 从 ${originalValue} 改为 ${newValue}`, 'success');
                
                // 自动保存
                saveToLocalStorage();
            };
            
            const cancelEdit = () => {
                input.remove();
                cell.classList.remove('editing');
                cell.textContent = originalContent;
            };
            
            input.addEventListener('blur', saveEdit);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    saveEdit();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    cancelEdit();
                }
            });
        }
        
        function calculateResult(row) {
            const formulaCell = row.cells[1];
            const sourceCell = row.cells[2];
            const resultCell = row.cells[3];
            
            const formula = formulaCell.textContent.trim();
            const sourceValue = sourceCell.getAttribute('data-source') || '1';
            
            try {
                // 计算基础公式
                const baseResult = evaluateFormula(formula);
                
                // 应用 Source 倍数
                const sourceMultiplier = parseFloat(sourceValue) || 1;
                const finalResult = baseResult * sourceMultiplier;
                
                resultCell.textContent = finalResult.toFixed(2);
                log(`行 ${row.getAttribute('data-id')} 计算结果: ${formula} * ${sourceValue} = ${finalResult}`, 'info');
            } catch (e) {
                resultCell.textContent = '错误';
                log(`行 ${row.getAttribute('data-id')} 计算错误: ${e.message}`, 'error');
            }
        }
        
        function evaluateFormula(formula) {
            // 简单的公式计算（仅支持基本运算）
            const sanitized = formula.replace(/[^0-9+\-*/().\s]/g, '');
            return new Function('return ' + sanitized)();
        }
        
        function saveToLocalStorage() {
            const rows = document.querySelectorAll('#tableBody tr');
            const data = [];
            
            rows.forEach(row => {
                const id = row.getAttribute('data-id');
                const formula = row.cells[1].textContent.trim();
                const source = row.cells[2].getAttribute('data-source') || '1';
                const result = row.cells[3].textContent.trim();
                
                data.push({
                    id: id,
                    formula: formula,
                    source: source,
                    result: result
                });
            });
            
            localStorage.setItem('testSourcePercent', JSON.stringify(data));
            log(`已保存 ${data.length} 行数据到本地存储`, 'success');
        }
        
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('testSourcePercent');
            if (!saved) {
                log('本地存储中没有数据', 'error');
                return;
            }
            
            try {
                const data = JSON.parse(saved);
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                
                data.forEach(item => {
                    const row = document.createElement('tr');
                    row.setAttribute('data-id', item.id);
                    row.innerHTML = `
                        <td>${item.id}</td>
                        <td>${item.formula}</td>
                        <td class="editable source-cell" data-source="${item.source}" ondblclick="editSource(this)">${item.source}</td>
                        <td class="result-cell">${item.result}</td>
                        <td><button onclick="deleteRow(this)">删除</button></td>
                    `;
                    tbody.appendChild(row);
                    calculateResult(row);
                });
                
                // 更新计数器
                if (data.length > 0) {
                    const maxId = Math.max(...data.map(d => parseInt(d.id)));
                    rowIdCounter = maxId;
                }
                
                log(`从本地存储加载了 ${data.length} 行数据`, 'success');
            } catch (e) {
                log(`加载数据失败: ${e.message}`, 'error');
            }
        }
        
        function clearData() {
            if (confirm('确定要清空所有数据吗？')) {
                localStorage.removeItem('testSourcePercent');
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                rowIdCounter = 0;
                log('已清空所有数据', 'info');
            }
        }
        
        // 页面加载时尝试从本地存储加载
        window.addEventListener('DOMContentLoaded', () => {
            log('页面加载完成，可以开始测试', 'success');
            log('测试步骤：', 'info');
            log('1. 双击 Source 列编辑值', 'info');
            log('2. 输入 1，按 Enter 保存', 'info');
            log('3. 点击"保存到本地存储"', 'info');
            log('4. 刷新页面', 'info');
            log('5. 点击"从本地存储加载"', 'info');
            log('6. 检查 Source 值是否仍然是 1（不应该变成 0.01）', 'info');
        });
    </script>
</body>
</html>
